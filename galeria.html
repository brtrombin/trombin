<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>galeria — tromb.in</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #1e2e22;
  --bg-dark: #162318;
  --bg-deeper: #0f1a12;
  --green-border: #2e4a32;
  --green-mid: #243a28;
  --ektar-red: #c8341a;
  --ektar-orange: #d4621e;
  --ektar-amber: #e8a830;
  --cream: #f0e8d0;
  --cream-dim: #b8a880;
  --cream-ghost: #6a5a40;
  --mono: 'Share Tech Mono', monospace;
  --serif: 'Playfair Display', serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--cream);
  font-family: var(--mono);
  min-height: 100vh;
  overflow-x: hidden;
}

body::after {
  content: '';
  position: fixed;
  inset: 0;
  z-index: 998;
  pointer-events: none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  opacity: .05;
  mix-blend-mode: screen;
}

/* NAV */
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: .9rem 2rem;
  background: rgba(30,46,34,.94);
  backdrop-filter: blur(8px);
  border-bottom: 1px solid var(--green-border);
}

.logo {
  font-family: var(--mono);
  font-size: .9rem;
  letter-spacing: .2em;
  color: var(--cream);
  text-decoration: none;
}
.logo em { color: var(--ektar-red); font-style: normal; }

.nav-right { display: flex; align-items: center; gap: 1.5rem; }
.nav-right a {
  font-family: var(--mono);
  font-size: .62rem;
  letter-spacing: .16em;
  text-transform: uppercase;
  color: var(--cream-dim);
  text-decoration: none;
  transition: color .2s;
}
.nav-right a:hover { color: var(--cream); }
.nav-right a.active { color: var(--ektar-red); }
.nav-pill {
  border: 1px solid var(--ektar-red);
  padding: .22rem .7rem;
  color: var(--ektar-red) !important;
}

/* HEADER */
.page-header {
  padding: 90px 2rem 0;
  background: var(--bg-deeper);
  border-bottom: 1px solid var(--green-border);
}

.film-strip {
  height: 24px;
  display: flex;
  align-items: center;
  padding: 0 4px;
  overflow: hidden;
}

.perf {
  width: 13px;
  height: 9px;
  background: #080f0a;
  border: 1px solid var(--green-mid);
  border-radius: 2px;
  margin-right: 17px;
  flex-shrink: 0;
}

.page-title-row {
  padding: 2rem 0 1.5rem;
  display: flex;
  align-items: baseline;
  justify-content: space-between;
}

.page-title {
  font-family: var(--mono);
  font-size: .65rem;
  letter-spacing: .25em;
  text-transform: uppercase;
  color: var(--ektar-red);
}

.page-count {
  font-family: var(--mono);
  font-size: .58rem;
  letter-spacing: .15em;
  color: var(--cream-ghost);
  text-transform: uppercase;
}

/* FILTER BAR */
.filter-bar {
  display: flex;
  gap: .5rem;
  padding-bottom: 1.5rem;
  flex-wrap: wrap;
}

.filter-btn {
  font-family: var(--mono);
  font-size: .55rem;
  letter-spacing: .15em;
  text-transform: uppercase;
  color: var(--cream-ghost);
  background: transparent;
  border: 1px solid var(--green-border);
  padding: .25rem .7rem;
  cursor: pointer;
  transition: all .2s;
}

.filter-btn:hover, .filter-btn.active {
  color: var(--cream);
  border-color: var(--cream-ghost);
}

.filter-btn.active {
  color: var(--ektar-red);
  border-color: var(--ektar-red);
}

/* GRID */
.gallery-wrap {
  padding: 2rem;
}

.gallery-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 3px;
}

/* FRAME CELL */
.frame-cell {
  position: relative;
  aspect-ratio: 3/2;
  overflow: hidden;
  background: var(--bg-deeper);
  cursor: pointer;
}

.frame-cell .ph {
  width: 100%;
  height: 100%;
  transition: filter .35s, transform .35s;
}

.frame-cell img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  filter: contrast(1.08) saturate(1.15);
  transition: filter .35s, transform .35s;
}

/* sempre visível: metadados no canto */
.frame-meta {
  position: absolute;
  bottom: 6px;
  left: 7px;
  font-family: var(--mono);
  font-size: .5rem;
  color: rgba(255,140,0,.7);
  letter-spacing: .08em;
  line-height: 1.5;
  text-shadow: 0 0 6px rgba(0,0,0,.8);
  pointer-events: none;
  z-index: 2;
}

.frame-idx {
  position: absolute;
  top: 6px;
  left: 7px;
  font-family: var(--mono);
  font-size: .48rem;
  color: rgba(255,140,0,.45);
  letter-spacing: .08em;
  pointer-events: none;
  z-index: 2;
}

/* hover overlay com legenda */
.frame-hover {
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, rgba(15,26,18,.9) 0%, rgba(15,26,18,.3) 50%, transparent 100%);
  opacity: 0;
  transition: opacity .3s;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: .7rem;
  z-index: 3;
}

.frame-cell:hover .frame-hover { opacity: 1; }
.frame-cell:hover .ph,
.frame-cell:hover img {
  filter: contrast(1.15) saturate(1.3) brightness(.88);
  transform: scale(1.03);
}

.hover-title {
  font-family: var(--serif);
  font-size: .8rem;
  font-style: italic;
  color: var(--cream);
  line-height: 1.3;
  margin-bottom: .25rem;
}

.hover-caption {
  font-family: var(--mono);
  font-size: .5rem;
  letter-spacing: .1em;
  color: var(--cream-dim);
  text-transform: uppercase;
  line-height: 1.5;
}

/* indicador de texto relacionado */
.has-text-badge {
  position: absolute;
  top: 6px;
  right: 7px;
  font-family: var(--mono);
  font-size: .45rem;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--ektar-red);
  border: 1px solid var(--ektar-red);
  padding: 1px 4px;
  opacity: .8;
  z-index: 2;
  pointer-events: none;
}

/* LIGHTBOX */
.lightbox {
  position: fixed;
  inset: 0;
  z-index: 500;
  background: rgba(10,16,11,.96);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity .3s;
}

.lightbox.open {
  opacity: 1;
  pointer-events: all;
}

.lb-inner {
  display: grid;
  grid-template-columns: 1fr 320px;
  max-width: 1100px;
  width: 95vw;
  max-height: 90vh;
  background: var(--bg-dark);
  border: 1px solid var(--green-border);
  position: relative;
  overflow: hidden;
}

.lb-photo {
  position: relative;
  overflow: hidden;
  background: var(--bg-deeper);
}

.lb-photo .ph {
  width: 100%;
  height: 100%;
  min-height: 400px;
}

.lb-photo img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  filter: contrast(1.1) saturate(1.2);
}

.lb-stamp {
  position: absolute;
  bottom: 12px;
  right: 14px;
  font-family: var(--mono);
  font-size: .6rem;
  color: #ff8c00;
  letter-spacing: .1em;
  text-shadow: 0 0 8px rgba(255,140,0,.5);
  line-height: 1.6;
  text-align: right;
}

.lb-frame-n {
  position: absolute;
  top: 10px;
  left: 12px;
  font-family: var(--mono);
  font-size: .55rem;
  color: rgba(255,140,0,.5);
  letter-spacing: .1em;
}

.lb-info {
  padding: 2rem 1.5rem;
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  border-left: 1px solid var(--green-border);
}

.lb-eyebrow {
  font-family: var(--mono);
  font-size: .55rem;
  letter-spacing: .2em;
  text-transform: uppercase;
  color: var(--ektar-red);
  margin-bottom: 1rem;
}

.lb-title {
  font-family: var(--serif);
  font-size: 1.4rem;
  font-style: italic;
  color: var(--cream);
  line-height: 1.2;
  margin-bottom: 1rem;
  font-weight: 400;
}

.lb-caption {
  font-family: var(--serif);
  font-size: .85rem;
  line-height: 1.75;
  color: var(--cream-dim);
  font-style: italic;
  margin-bottom: 1.5rem;
  flex: 1;
}

.lb-meta {
  border-top: 1px solid var(--green-border);
  padding-top: 1rem;
  margin-bottom: 1.5rem;
}

.lb-meta-row {
  display: flex;
  justify-content: space-between;
  margin-bottom: .4rem;
}

.lb-meta-key {
  font-size: .52rem;
  letter-spacing: .1em;
  color: var(--cream-ghost);
  text-transform: uppercase;
}

.lb-meta-val {
  font-size: .54rem;
  letter-spacing: .08em;
  color: var(--cream-dim);
}

.lb-text-link {
  display: block;
  font-family: var(--mono);
  font-size: .58rem;
  letter-spacing: .15em;
  text-transform: uppercase;
  color: var(--cream);
  background: var(--ektar-red);
  padding: .65rem 1rem;
  text-decoration: none;
  text-align: center;
  transition: background .2s;
}
.lb-text-link:hover { background: var(--ektar-orange); }

.lb-close {
  position: absolute;
  top: 12px;
  right: 12px;
  width: 32px;
  height: 32px;
  background: transparent;
  border: 1px solid var(--green-border);
  color: var(--cream-dim);
  font-size: 1rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10;
  transition: all .2s;
  font-family: var(--mono);
}
.lb-close:hover { border-color: var(--cream); color: var(--cream); }

.lb-nav {
  position: absolute;
  bottom: 12px;
  left: 12px;
  display: flex;
  gap: .4rem;
}

.lb-nav-btn {
  width: 30px;
  height: 30px;
  background: rgba(30,46,34,.8);
  border: 1px solid var(--green-border);
  color: var(--cream-dim);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--mono);
  font-size: .8rem;
  transition: all .2s;
}
.lb-nav-btn:hover { border-color: var(--cream-ghost); color: var(--cream); }

footer {
  border-top: 1px solid var(--green-border);
  padding: 2rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.footer-logo { font-family: var(--mono); font-size: .82rem; letter-spacing: .15em; color: var(--cream); }
.footer-logo em { color: var(--ektar-red); font-style: normal; }
.footer-links { display: flex; gap: 1.5rem; }
.footer-links a { font-family: var(--mono); font-size: .58rem; letter-spacing: .14em; text-transform: uppercase; color: var(--cream-ghost); text-decoration: none; transition: color .2s; }
.footer-links a:hover { color: var(--cream); }

@media (max-width: 900px) {
  .gallery-grid { grid-template-columns: repeat(3, 1fr); }
  .lb-inner { grid-template-columns: 1fr; max-height: 95vh; overflow-y: auto; }
  .lb-photo .ph { min-height: 50vw; }
  .lb-info { border-left: none; border-top: 1px solid var(--green-border); }
}

@media (max-width: 600px) {
  nav { padding: .8rem 1.2rem; }
  .nav-right { gap: .8rem; }
  .gallery-grid { grid-template-columns: repeat(2, 1fr); }
  .gallery-wrap { padding: 1rem; }
  .page-header { padding: 80px 1rem 0; }
  footer { flex-direction: column; gap: 1rem; text-align: center; }
}
</style>
</head>

  <button class="lb-close" id="lb-close">&#215;</button>
</div>

<script>
const photos = [
  {

    textLink: 'texto.html', textTitle: 'O que veio antes do sim'
  }
];

let current = 0;
let filtered = [...photos];

const grid = document.getElementById('grid');
const lightbox = document.getElementById('lightbox');

function renderGrid(list) {
  grid.innerHTML = '';
  list.forEach((p, i) => {
    const cell = document.createElement('div');
    cell.className = 'frame-cell';
    cell.innerHTML = `
      <div class="ph" style="background:${p.bg}"></div>
      <span class="frame-idx">${p.idx}</span>
      <div class="frame-meta">${p.date}<br>${p.camera.split(' ').pop()}</div>
      ${p.textLink ? '<span class="has-text-badge">texto</span>' : ''}
      <div class="frame-hover">
        <p class="hover-title">${p.title}</p>
        <p class="hover-caption">${p.loc} &middot; ${p.film}</p>
      </div>
    `;
    cell.addEventListener('click', () => openLightbox(i, list));
    grid.appendChild(cell);
  });
  document.getElementById('count-label').textContent = list.length + ' frames';
}

function openLightbox(i, list) {
  current = i;
  const p = list[i];
  document.getElementById('lb-ph').style.background = p.bg;
  document.getElementById('lb-fn').textContent = p.idx;
  document.getElementById('lb-stamp').innerHTML = `${p.loc}<br>${p.date}<br>${p.camera}`;
  document.getElementById('lb-eyebrow').textContent = `frame ${p.idx} · ${p.film}`;
  document.getElementById('lb-title').textContent = p.title;
  document.getElementById('lb-caption').textContent = p.caption;
  document.getElementById('lb-meta').innerHTML = `
    <div class="lb-meta-row"><span class="lb-meta-key">câmera</span><span class="lb-meta-val">${p.camera}</span></div>
    <div class="lb-meta-row"><span class="lb-meta-key">filme</span><span class="lb-meta-val">${p.film}</span></div>
    <div class="lb-meta-row"><span class="lb-meta-key">local</span><span class="lb-meta-val">${p.loc}</span></div>
    <div class="lb-meta-row"><span class="lb-meta-key">data</span><span class="lb-meta-val">${p.date}</span></div>
  `;
  const link = document.getElementById('lb-link');
  if (p.textLink) {
    link.href = p.textLink;
    link.textContent = `ler: ${p.textTitle} →`;
    link.style.display = 'block';
  } else {
    link.style.display = 'none';
  }
  lightbox.classList.add('open');
  document.body.style.overflow = 'hidden';

  document.getElementById('lb-prev').onclick = (e) => { e.stopPropagation(); if(current>0){openLightbox(current-1,list);} };
  document.getElementById('lb-next').onclick = (e) => { e.stopPropagation(); if(current<list.length-1){openLightbox(current+1,list);} };
}

function closeLightbox() {
  lightbox.classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('lb-close').addEventListener('click', closeLightbox);
lightbox.addEventListener('click', (e) => { if(e.target === lightbox) closeLightbox(); });
document.addEventListener('keydown', (e) => {
  if (!lightbox.classList.contains('open')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft' && current > 0) openLightbox(current - 1, filtered);
  if (e.key === 'ArrowRight' && current < filtered.length - 1) openLightbox(current + 1, filtered);
});

// filtros
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const f = btn.dataset.filter;
    filtered = f === 'all' ? [...photos] : photos.filter(p => p.cat.includes(f));
    renderGrid(filtered);
  });
});

// perfurações
function makePerfs() {
  const el = document.getElementById('perfs');
  if (!el) return;
  const n = Math.ceil(window.innerWidth / 30) + 2;
  el.innerHTML = Array(n).fill('<div class="perf"></div>').join('');
}
makePerfs();
window.addEventListener('resize', makePerfs);

renderGrid(photos);
</script>
</body>
</html>
