name: Sync Substack

on:
  schedule:
    - cron: "0 7 * * *"   # diariamente às 07:00 UTC (04:00 BRT)
  workflow_dispatch:        # permite rodar manualmente pelo GitHub UI

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install -r requirements-sync.txt

      - name: Rodar sync
        run: python scripts/sync-substack.py

      - name: Commit e push se houver novidades
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add articles/ img/
          if git diff --staged --quiet; then
            echo "Nenhum post novo encontrado."
          else
            git commit -m "sync: importa novos textos do Substack"
            git push
          fi
